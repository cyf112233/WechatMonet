name: Build Magisk Module (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    # ---------- 第一步：使用 JDK 17 运行 sdkmanager（满足其版本要求） ----------
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 设置 Android SDK（不自动接受许可，我们手动处理）
      uses: android-actions/setup-android@v4
      with:
        accept-android-sdk-licenses: false   # 避免内部版本检查问题

    - name: 接受许可并安装所需组件
      shell: cmd
      run: |
        set SKIP_JDK_VERSION_CHECK=true
        echo y | sdkmanager --licenses
        sdkmanager "platforms;android-35" "build-tools;37.0.0" "ndk;29.0.13599879" "cmake;3.22.1"

    # ---------- 第二步：切换 JDK 21 用于编译（你的任务需要 --release 21） ----------
    - name: 设置 JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 编译 Magisk 模块
      shell: cmd
      run: .\gradlew.bat packageMagiskModule -Psdk.dir=%ANDROID_HOME% --no-daemon

    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: magisk-module
        path: build\outputs\magisk\*.zip
