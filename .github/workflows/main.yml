name: Build Magisk Module (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    # 第一步：使用 JDK 8 运行 sdkmanager
    - name: 设置 JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    # 设置 Android SDK，并自动接受所有许可
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v4
      with:
        accept-licenses: true    # 关键：自动同意许可，避免手动输入

    # 安装所需组件（无需再单独运行 --licenses）
    - name: 安装 SDK 组件
      shell: cmd
      run: |
        sdkmanager "platforms;android-35" "build-tools;37.0.0" "ndk;29.0.13599879" "cmake;3.22.1"

    # 第二步：切换回 JDK 21，用于编译代码（你的 Gradle 需要 --release 21）
    - name: 设置 JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: 修复 CMake 路径
      shell: cmd
      run: |
        REM 查找实际安装的 CMake 目录（版本号可能不同）
        for /d %%i in (%ANDROID_HOME%\cmake\*) do (
        if exist "%%i\bin\cmake.exe" (
        set REAL_CMAKE=%%i
        goto :found
        )
        )
        :found
        echo 实际 CMake 路径: %REAL_CMAKE%
        REM 创建脚本期望的目录（如果不存在）
        if not exist %ANDROID_HOME%\cmake\3.22.1 mkdir %ANDROID_HOME%\cmake\3.22.1
        REM 复制 bin 目录（无需管理员权限）
        xcopy /E /I %REAL_CMAKE%\bin %ANDROID_HOME%\cmake\3.22.1\bin
    # 编译 Magisk 模块
    - name: 编译
      shell: cmd
      run: .\gradlew.bat packageMagiskModule -Psdk.dir=%ANDROID_HOME% --no-daemon

    # 上传产物
    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: magisk-module
        path: build\outputs\magisk\*.zip
