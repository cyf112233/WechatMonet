name: Build Magisk Module (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: windows-latest   # 使用 Windows 环境

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 设置 Android SDK
      uses: android-actions/setup-android@v4

    - name: 安装所需的 SDK 组件
      shell: cmd   # 使用 cmd 执行
      run: |
        call %ANDROID_HOME%\tools\bin\sdkmanager.bat --licenses
        call %ANDROID_HOME%\tools\bin\sdkmanager.bat "platforms;android-35" "build-tools;37.0.0" "ndk;29.0.13599879" "cmake;3.22.1"

    - name: 编译 Magisk 模块
      shell: cmd
      run: .\gradlew.bat packageMagiskModule -Psdk.dir=%ANDROID_HOME% --no-daemon

    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: magisk-module
        path: build\outputs\magisk\*.zip
